<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配手机/电脑 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息展示</title>
    <style>
        /* 简单样式优化，可随意调参数 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 背景色参数：可改颜色值 */
            background: #f5f5f5;
            /* 居中显示 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "微软雅黑", sans-serif;
        }
        .info-box {
            /* 卡片样式参数 */
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .name {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
        }
        .id {
            font-size: 22px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="info-box">
        <!-- 👇 这里直接改你的姓名和学号，就是调参数！ -->
        <h1 class="name">麦澄朗</h1>
        <p class="id">学号：202335020631</p>
    </div>
</body>
</html>
